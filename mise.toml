# Mise task runner — the source of truth for build/run/serve commands.
# See CLAUDE.md: every serving/build command goes through `mise run <task>`,
# and any new working command must be added back here as a task.

[tools]
# Node 20 (>= 20.19) satisfies Eleventy's deps and TinaCMS's better-sqlite3.
node = "20"

[env]
# Loads gitignored env (e.g. CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID for
# wrangler) if a .env is present; wrangler otherwise falls back to OAuth login.
_.file = ".env"

[tasks.deps]
description = "Install npm dependencies (auto-runs before dev/build; skipped when node_modules is already up to date)"
run = "npm install"
# Change detection: mise skips this task unless package.json / package-lock.json
# are newer than npm's install marker. Keeps node_modules in sync with
# package.json so a newly-added dep (e.g. onchange) can't go missing.
sources = ["package.json", "package-lock.json"]
outputs = ["node_modules/.package-lock.json"]

[tasks.css]
description = "Compile Bootstrap SCSS (scss/) into css/styles.css"
depends = ["deps"]
run = "npm run css"

[tasks.build]
description = "Build the static site into _site/ (SCSS + Eleventy)"
depends = ["deps"]
run = "npm run build"

# `dev` and `dev-stop` are file tasks under `mise-tasks/` (multi-line logic):
# `dev` records a worktree-local .dev-server.pid so `dev-stop` can stop only THIS
# worktree's server instead of every worktree's via a broad `pkill`.

[tasks.dev-pinned]
description = "Like dev but on a pinned port (default 8790; override: PORT=8791 mise run dev-pinned) — avoids 808x port races when several worktree sessions serve at once"
depends = ["deps"]
run = 'npm run css && npx npm-run-all --parallel watch "serve -- --port=${PORT:-8790}"'

[tasks.format]
description = "Reformat HTML/Liquid templates (_layouts, _includes, index.html) with Prettier"
depends = ["deps"]
run = "npm run format"

[tasks.format-check]
description = "Check HTML/Liquid template formatting without writing (CI-friendly)"
depends = ["deps"]
run = "npm run format:check"

[tasks.dev-tina]
description = "Serve Eleventy behind the TinaCMS dev server (content editing UI)"
depends = ["deps"]
run = "npx tinacms dev -c 'npx @11ty/eleventy --serve'"

[tasks.cf-pages-deploy]
description = "Deploy the built _site/ to the Cloudflare Pages beta (build first)"
run = "npx --yes wrangler pages deploy _site --project-name=maskarada-new-design"

[tasks.preview]
description = "Serve the built _site/ locally with Cloudflare Pages emulation (applies _headers/CSP — unlike `dev`; build first)"
run = "npx --yes wrangler pages dev _site --port 8788 --compatibility-date=2026-05-03"

[tasks.update-links]
description = "Update ticket links in spektakle YAML from new_events_raw.html export"
run = "python3 scripts/update_spektakle_links.py"

[tasks.resize-logo]
description = "Resize a logo image to web size (usage: mise run resize-logo -- path/to/logo.png)"
run = "mogrify -resize 600x600"
