# wrangler requires Node >= 22; Ruby for local Jekyll builds (github-pages gem)
[tools]
node = "22"
ruby = "3.3"

# Loads gitignored env (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID) into tasks
# if present; otherwise wrangler falls back to interactive OAuth login.
[env]
_.file = ".env"

[tasks.cf-pages-create]
description = "One-time: create the Cloudflare Pages project for the new-design-root preview"
run = "npx --yes wrangler pages project create maskarada-new-design --production-branch=new-design-root"

[tasks.cf-pages-deploy]
description = "Manually deploy an already-built ./_site to the new-design-root Cloudflare Pages preview"
run = "npx --yes wrangler pages deploy _site --project-name=maskarada-new-design --branch=new-design-root"
