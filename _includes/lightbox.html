{% comment %}
  Shared no-jQuery lightbox. Included once (from footer_t.html) so every
  `.gallery-item` link on the page opens full-size, grouped by data-gallery.
{% endcomment %}
<div id="lb-overlay" class="lb-overlay" aria-hidden="true">
  <button type="button" class="lb-close" aria-label="Zamknij">&times;</button>
  <button type="button" class="lb-prev" aria-label="Poprzednie">&#10094;</button>
  <img class="lb-img" src="" alt="">
  <button type="button" class="lb-next" aria-label="Następne">&#10095;</button>
</div>
<script>
  (function () {
    var overlay = document.getElementById('lb-overlay');
    if (!overlay) return;
    var img = overlay.querySelector('.lb-img');
    var group = [];
    var idx = 0;

    function show(i) {
      if (!group.length) return;
      idx = (i + group.length) % group.length;
      img.src = group[idx].getAttribute('href');
    }
    function open(el) {
      var g = el.getAttribute('data-gallery');
      group = Array.prototype.slice.call(
        document.querySelectorAll('.gallery-item[data-gallery="' + g + '"]')
      );
      idx = group.indexOf(el);
      img.src = el.getAttribute('href');
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
    }
    function close() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      img.src = '';
    }

    document.addEventListener('click', function (e) {
      var item = e.target.closest ? e.target.closest('.gallery-item') : null;
      if (item) { e.preventDefault(); open(item); }
    });
    overlay.querySelector('.lb-close').addEventListener('click', close);
    overlay.querySelector('.lb-prev').addEventListener('click', function (e) { e.stopPropagation(); show(idx - 1); });
    overlay.querySelector('.lb-next').addEventListener('click', function (e) { e.stopPropagation(); show(idx + 1); });
    overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
    document.addEventListener('keydown', function (e) {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowLeft') show(idx - 1);
      else if (e.key === 'ArrowRight') show(idx + 1);
    });
  })();
</script>
