<!--
  Buy-ticket action LAYOUT switcher — issue #49 (temporary review aid).
  Colour is decided (flat coral outline); this flips the ARRANGEMENT of the
  date row vs. the action pill (Kup bilet / Zadzwoń / wkrótce). Remove this
  include (and its line in _layouts/t.html), t/js/variant-switcher.js and
  scss/_buy-layout.scss once a layout is picked.
-->
<style>
  #btn-variant-switcher {
    position: fixed;
    left: 12px;
    bottom: 12px;
    z-index: 1080;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px;
    background: rgba(255, 253, 252, 0.96);
    border: 1px solid rgba(56, 2, 0, 0.14);
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(56, 2, 0, 0.18);
    font-family: Montserrat, sans-serif;
    max-width: 46vw;
  }
  #btn-variant-switcher .bvs-title {
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #9a6265;
    margin: 0 2px 2px;
  }
  #btn-variant-switcher button {
    appearance: none;
    border: 1px solid rgba(56, 2, 0, 0.14);
    background: #fff;
    color: #380200;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
  }
  #btn-variant-switcher button:hover {
    border-color: #e07b78;
  }
  #btn-variant-switcher button.is-active {
    background: #e07b78;
    color: #fff;
    border-color: #e07b78;
  }
</style>
<aside id="btn-variant-switcher" aria-label="Układ przycisku Kup bilet">
  <span class="bvs-title">Kup bilet — układ</span>
  <button type="button" data-variant="split">Split (data ↔ przycisk)</button>
  <button type="button" data-variant="left">Lewo (razem)</button>
  <button type="button" data-variant="center">Środek</button>
  <button type="button" data-variant="stacked">Current (stacked)</button>
</aside>
<script src="js/variant-switcher.js" defer></script>
