  <style>

       plugin at 500px, so the card hugs that limit and centers on desktop
       instead of stretching across the page with empty wings. */
    .fb-card,
    .ig-card {
      max-width: 534px; /* 500px plugin + card-body padding + border */
      margin-left: auto;
      margin-right: auto;
    }

    .fb-card .fb-page,
    .fb-card .fb-page span {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    /* Instagram profile card — a cream card matching the Facebook one, laid out
       like an IG profile header. No feed widget (Meta retired the profile
       plugin) and no third-party scripts; the Instagram flavour is limited to
       the gradient avatar ring + follow button so it sits in the site palette. */
    .ig-card .card-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 32px 28px;
      color: #380200;
    }

    .ig-avatar-ring {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .ig-avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #faf3f3;
      background: #faf3f3;
      display: block;
    }

    .ig-username {
      font-family: YoungSerif, serif;
      font-size: 1.5rem;
      margin: 0;
      color: #380200;
    }

    .ig-username a {
      color: inherit;
      text-decoration: none;
    }

    .ig-username a:hover,
    .ig-username a:focus {
      color: #f3015e;
      text-decoration: underline;
    }

    .ig-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .ig-stat {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .ig-stat .num {
      font-family: YoungSerif, serif;
      font-size: 1.3rem;
      color: #380200;
    }

    .ig-stat .lbl {
      font-size: 0.82rem;
      color: #9a6265;
    }

    .ig-follow-btn {
      display: inline-block;
      margin-top: 4px;
      background: linear-gradient(45deg, #f09433 0%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff;
      font-family: YoungSerif, serif;
      font-size: 1rem;
      text-decoration: none;
      padding: 11px 30px;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(220, 39, 67, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .ig-follow-btn:hover,
    .ig-follow-btn:focus {
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(220, 39, 67, 0.45);
    }

  </style>
