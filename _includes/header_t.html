  <!-- Facebook JS SDK (loads the Page Plugin feed in footer_t.html).
       Loaded lazily: the SDK + the plugin's feed pull ~2-3 MB (photos, videos),
       so we only fetch it when the footer widget scrolls near the viewport
       instead of on every page load. -->
  <div id="fb-root"></div>
  <script>(function () {
    var loaded = false;
    function loadFbSdk() {
      if (loaded || document.getElementById("facebook-jssdk")) return;
      loaded = true;
      var js = document.createElement("script");
      js.id = "facebook-jssdk";
      js.async = true;
      js.src = "https://connect.facebook.net/pl_PL/sdk.js#xfbml=1&version=v19.0";
      document.head.appendChild(js);
    }
    function init() {
      var target = document.querySelector(".fb-page");
      if (!target) return; // no FB widget on this page — never load the SDK
      if (!("IntersectionObserver" in window)) { loadFbSdk(); return; }
      var io = new IntersectionObserver(function (entries) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].isIntersecting) { io.disconnect(); loadFbSdk(); return; }
        }
      }, { rootMargin: "600px 0px" });
      io.observe(target);
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else { init(); }
  })();</script>
  <style>
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1030;
      transition: transform 0.25s ease;
    }

    /* Auto-hide on scroll down (class toggled by the script below).
       The extra 64px covers the logo sign hanging below the header
       (plus its drop shadow), so nothing stays peeking out. */
    .site-header.hdr-hide {
      transform: translateY(calc(-100% - 64px));
    }

    @media (prefers-reduced-motion: reduce) {
      .site-header {
        transition: none;
      }
    }

    .site-header .bar {
      background: #ffffff;
      box-shadow: 0 3px 0 rgba(74, 125, 165, 0.3);
    }

    .site-header .container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.25rem 1.5rem;
      padding-top: 0.55rem;
      padding-bottom: 0.65rem;
    }

    .brand {
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .brand img {
      height: 66px;
      width: auto;
      display: block;
    }

    .site-header .site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.1rem 0.25rem;
    }

    .site-header a.nav-link {
      font-family: YoungSerif, serif;
      font-size: 1.2rem;
      color: #4a708e;
      padding: 0.25rem 0.5rem;
    }

    .site-header a.nav-link:hover {
      color: #e0736f;
    }

    .site-header a.nav-link.active {
      color: #e0736f;
      text-decoration: underline;
      text-underline-offset: 0.32em;
      text-decoration-thickness: 2px;
    }

    /* Social icons — desktop only, same colour/hover as the nav links */
    .site-header .nav-social {
      display: inline-flex;
      align-items: center;
      gap: 0.1rem;
      margin-left: 0.35rem;
      align-self: center;
    }

    .site-header a.social-link {
      display: inline-flex;
      align-items: center;
      color: #4a708e;
      padding: 0.25rem 0.4rem;
    }

    .site-header a.social-link:hover {
      color: #e0736f;
    }

    .site-header a.social-link svg {
      width: 1.2rem;
      height: 1.2rem;
      fill: currentColor;
      display: block;
    }

    /* Paper bunting garland hanging from the header */
    .bunting {
      height: 15px;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="15"><path d="M2 0 H26 L14 13 Z" fill="%23e0736f"/><path d="M30 0 H54 L42 13 Z" fill="%23f2c94c"/></svg>');
      background-repeat: repeat-x;
      background-size: 56px 15px;
    }

    /* Desktop: the logo is a bigger sign hanging over the bunting garland,
       swaying gently; the bar itself keeps its compact height. */
    @media (min-width: 768px) {
      .brand {
        position: relative;
        z-index: 2;
      }

      .brand img {
        height: 108px;
        margin-bottom: -42px;
        filter: drop-shadow(0 4px 3px rgba(74, 125, 165, 0.3));
        transform-origin: 50% 0;
        animation: logo-sway 5s ease-in-out infinite;
      }
    }

    @keyframes logo-sway {
      0%, 100% { transform: rotate(-1.6deg); }
      50% { transform: rotate(1.6deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand img {
        animation: none;
      }
    }

    @media (max-width: 767px) {
      .site-header .container {
        flex-direction: column;
        align-items: center;
        padding-top: 0.6rem;
        padding-bottom: 0.55rem;
        /* let the nav run edge to edge */
        padding-left: 0.1rem;
        padding-right: 0.1rem;
      }

      .brand img {
        height: 52px;
      }

      .site-header .site-nav {
        justify-content: center;
        width: 100%;
        gap: 0;
      }

      .site-header a.nav-link {
        /* 20% bigger than the old 1.08rem on typical phones (1.3rem), easing
           down just enough on the narrowest screens to keep the nav at 2 rows */
        font-size: clamp(1.1rem, 5.2vw, 1.3rem);
        padding: 0.18rem 0.26rem;
      }

      /* Social icons would clutter the phone nav — desktop only */
      .site-header .nav-social {
        display: none;
      }
    }
  </style>

  <script>
    // Auto-hiding site header: hide on scroll down, reveal on scroll up.
    // Also maintains --hdr-h (visible header height) for sticky elements
    // below the header (e.g. the Kalendarz filter bar).
    (function () {
      var hdr = document.querySelector(".site-header");
      if (!hdr) return;
      var hdrHidden = false;
      function setHdrVar() {
        var h = hdrHidden ? 0 : hdr.getBoundingClientRect().height;
        document.documentElement.style.setProperty("--hdr-h", h + "px");
      }
      setHdrVar();
      var lastY = window.scrollY || 0;
      window.addEventListener("scroll", function () {
        var y = window.scrollY || 0;
        if (y > lastY + 6 && y > 180 && !hdrHidden) {
          hdrHidden = true;
          hdr.classList.add("hdr-hide");
          setHdrVar();
        } else if ((y < lastY - 6 || y < 120) && hdrHidden) {
          hdrHidden = false;
          hdr.classList.remove("hdr-hide");
          setHdrVar();
        }
        lastY = y;
      }, { passive: true });
      window.addEventListener("resize", setHdrVar, { passive: true });
    })();
  </script>
