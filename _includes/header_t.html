  <style>
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1030;
    }

    .site-header .bar {
      background: #ffffff;
      box-shadow: 0 3px 0 rgba(74, 125, 165, 0.3);
    }

    .site-header .container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.25rem 1.5rem;
      padding-top: 0.55rem;
      padding-bottom: 0.65rem;
    }

    .brand {
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .brand img {
      height: 66px;
      width: auto;
      display: block;
    }

    .site-header .site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.1rem 0.25rem;
    }

    .site-header a.nav-link {
      font-family: YoungSerif, serif;
      font-size: 1.08rem;
      color: #4a708e;
      padding: 0.2rem 0.45rem;
    }

    .site-header a.nav-link:hover {
      color: #e0736f;
    }

    .site-header a.nav-link.active {
      color: #e0736f;
      text-decoration: underline;
      text-underline-offset: 0.32em;
      text-decoration-thickness: 2px;
    }

    /* Paper bunting garland hanging from the header */
    .bunting {
      height: 15px;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="15"><path d="M2 0 H26 L14 13 Z" fill="%23e0736f"/><path d="M30 0 H54 L42 13 Z" fill="%23f2c94c"/></svg>');
      background-repeat: repeat-x;
      background-size: 56px 15px;
    }

    @media (max-width: 767px) {
      .site-header .container {
        flex-direction: column;
        align-items: center;
        padding-top: 0.6rem;
        padding-bottom: 0.55rem;
      }

      .brand img {
        height: 52px;
      }

      .site-header .site-nav {
        justify-content: center;
      }

      .site-header a.nav-link {
        font-size: 0.98rem;
        padding: 0.15rem 0.35rem;
      }
    }
  </style>
  {% assign url = page.url | downcase | split: '/' %}
  {% assign ur = url[2] | split: '.' %}
  {% assign u = ur[0] %}
  <header class="site-header">
    <div class="bar">
      <div class="container">
        <a class="brand" href="index.html">
          <img src="lay/img/logo2.png" alt="Teatr Maskarada" />
        </a>
        <nav class="site-nav">
          <a class="nav-link {% if page.url == '/t/' %}active{% endif %}" href="index.html">Teraz</a>
          <a class="nav-link {% if u == 'repertuar' %}active{% endif %}" href="repertuar.html">Kalendarz</a>
          <a class="nav-link {% if u == 'spektakle' %}active{% endif %}" href="spektakle.html">Spektakle</a>
          <a class="nav-link {% if u == 'warsztaty' %}active{% endif %}" href="warsztaty.html">Warsztaty</a>
          <a class="nav-link {% if u == 'bilety' %}active{% endif %}" href="bilety.html">Bilety</a>
          <a class="nav-link {% if u == 'onas' %}active{% endif %}" href="onas.html">Historia</a>
          <a class="nav-link {% if u == 'kontakt' %}active{% endif %}" href="kontakt.html">Kontakt</a>
        </nav>
      </div>
    </div>
    <div class="bunting"></div>
  </header>
